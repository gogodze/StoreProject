name: "[🛠️] Build and deploy - staging (Kubernetes via SSH)"

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

permissions:
  contents: read

env:
  NETCORE_VERSION: "9.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOCKER_IMAGE_NAME: gogodze/store-staging
  K8S_NAMESPACE: apps
  K8S_DEPLOYMENT: zebracraft
  K8S_CONTAINER: zebracraft

jobs:
  test:
    name: "[🧪] Test"
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest

    steps:
      - name: "[🛎️] Checkout"
        uses: actions/checkout@v4

      - name: "[🏢] Setup dotnet"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.NETCORE_VERSION }}

      - name: "[🔃] Load nuget cache"
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: "~/.nuget/packages"
          key: "${{ runner.os }}-nuget-api-${{ hashFiles('**/*.csproj') }}"
          restore-keys: "${{ runner.os }}-nuget-api-"

      - name: "[✅] Cache status"
        run: |
          echo "Cache hit: ${{ steps.nuget-cache.outputs.cache-hit }}"

      - name: "[📦] Restore packages"
        run: dotnet restore --verbosity minimal

      - name: "[🧪] Run tests"
        run: dotnet test --no-restore --verbosity minimal

  build-and-push:
    name: "[🐳] Build and push image"
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USER_ID=1000
            GROUP_ID=1000
            USERNAME=shipping

  deploy-k8s:
    name: "[🚀] Deploy via SSH + kubectl"
    needs: [build-and-push]
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: "[🛡️] VPN"
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved
          cat << 'EOF' > vpn-config.ovpn
          ${{ secrets.OVPN_CONFIG }}
          EOF
      - uses: kota65535/github-openvpn-connect-action@v2
        with:
          config_file: vpn-config.ovpn

      - name: "[🔑] SSH key"
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/ci-zebracraft-deploy
          chmod 600 ~/.ssh/ci-zebracraft-deploy

      - name: "[🚀] Deploy on fortress (restricted SSH command)"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE: ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
        run: |
          # IdentitiesOnly requires -i or no key is offered (Permission denied)
          ssh -p "$SSH_PORT" \
            -i ~/.ssh/ci-zebracraft-deploy \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" "deploy-zebracraft ${IMAGE}"
